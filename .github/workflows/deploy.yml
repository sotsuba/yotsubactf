name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Backup PostgreSQL before deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            DATE=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR="/home/${{ secrets.VPS_USER }}/backups/postgres"
            mkdir -p $BACKUP_DIR

            docker exec yotsubactf-postgres-1 pg_dump \
              -U ${{ secrets.POSTGRES_USER }} \
              ${{ secrets.POSTGRES_DB }} | gzip > "$BACKUP_DIR/pre_deploy_$DATE.sql.gz"

            find $BACKUP_DIR -name "pre_deploy_*.sql.gz" -mtime +7 -delete

            rclone copy $BACKUP_DIR gdrive:vps-backups/postgres

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.deploy.yml"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }} 
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            
            cat <<EOF > .env
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            DISCORD_APPLICATION_ID=${{ secrets.DISCORD_APPLICATION_ID }}
            BOT_CONTACT_EMAIL=${{ secrets.BOT_CONTACT_EMAIL }}
            EOF
            
            chmod 600 .env
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
            
            docker logout ghcr.io
            docker image prune -f
