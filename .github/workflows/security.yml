name: Security audit

on:
  schedule:
    - cron: '0 2 * * 1'    # mỗi thứ Hai lúc 2AM
  push:
    paths:
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: RustSec Audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: |
            RUSTSEC-2023-0071