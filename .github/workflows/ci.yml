name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_VERSION: "1.95"
  REGISTRY: ghcr.io

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          key: "v1-${{ env.RUST_VERSION }}"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: pgvector/pgvector:pg16  
        env:
          POSTGRES_USER: ctfbot
          POSTGRES_PASSWORD: ctfbot
          POSTGRES_DB: ctfbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s

    env:
      DATABASE_URL: postgres://ctfbot:ctfbot@localhost:5432/ctfbot
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust deps (includes sqlx-cli)
        uses: Swatinem/rust-cache@v2
        with:
          key: "v1-${{ env.RUST_VERSION }}"
          cache-directories: "~/.cargo/bin"

      - name: Install sqlx-cli
        run: |
          # Chỉ install nếu chưa có (cache hit)
          which sqlx || cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run --source migrations
        env:
          SQLX_OFFLINE: "false"

      - name: cargo test
        run: cargo test --workspace
        env:
          SQLX_OFFLINE: "false"

      - name: Verify sqlx offline data is synced
        run: cargo sqlx prepare --workspace --check
        env:
          SQLX_OFFLINE: "false"

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [gateway, scheduler]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.target }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,scope=${{ matrix.target }},mode=max