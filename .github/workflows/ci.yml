name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_VERSION: "1.88"

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          # Cache key includes Rust version to invalidate on toolchain update
          key: "v1-${{ env.RUST_VERSION }}"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check           # only run if check passes

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ctfbot
          POSTGRES_PASSWORD: ctfbot
          POSTGRES_DB: ctfbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s

    env:
      DATABASE_URL: postgres://ctfbot:ctfbot@localhost:5432/ctfbot
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          key: "v1-${{ env.RUST_VERSION }}"

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run --source migrations
        env:
          SQLX_OFFLINE: "false"

      - name: cargo test (full workspace, includes sqlx::test)
        run: cargo test --workspace
        env:
          SQLX_OFFLINE: "false"
          # sqlx::test spawns its own Postgres connections via DATABASE_URL

      - name: Verify sqlx offline data is synced
        # If dev forgets to run 'make prepare' after query changes,
        # this step will fail with a clear message.
        run: |
          cargo sqlx prepare --workspace --check
        env:
          SQLX_OFFLINE: "false"

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          target: gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

      - name: Build and push scheduler
        uses: docker/build-push-action@v5
        with:
          context: .
          target: scheduler
          push: true
          tags: ghcr.io/${{ github.repository }}/scheduler:latest
          cache-from: type=gha,scope=scheduler
          cache-to: type=gha,scope=scheduler,mode=max
