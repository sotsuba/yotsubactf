name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need full history for changelog generation

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog from conventional commits
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gateway with version tag
        uses: docker/build-push-action@v5
        with:
          context: .
          target: gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/gateway:latest
          cache-from: type=gha,scope=gateway

      - name: Build and push scheduler with version tag
        uses: docker/build-push-action@v5
        with:
          context: .
          target: scheduler
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/scheduler:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/scheduler:latest
          cache-from: type=gha,scope=scheduler

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

