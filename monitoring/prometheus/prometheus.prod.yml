# monitoring/prometheus/prometheus.prod.yml
global:
  scrape_interval: 15s

rule_files:
  - "/etc/prometheus/recording_rules.yml"
  - "/etc/prometheus/alerts/common.yml"
  - "/etc/prometheus/alerts/prod-only.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8085']
  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8085']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
