groups:
  - name: ctfbot_alerts
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Gateway service is down"
          description: "Gateway on {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: SchedulerDown
        expr: up{job="scheduler"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scheduler service is down"
          description: "Scheduler on {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: HighCommandErrorRate
        expr: sum(rate(gateway_commands_total{result="error"}[5m])) / sum(rate(gateway_commands_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High command error rate"
          description: "Over 10% of commands in the last 5 minutes resulted in errors."

      - alert: CTFTimeApiHighLatency
        expr: histogram_quantile(0.9, sum(rate(ctftime_api_latency_seconds_bucket[5m])) by (le, endpoint)) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CTFTime API high latency"
          description: "p90 latency for {{ $labels.endpoint }} is above 10s for 10 minutes."
