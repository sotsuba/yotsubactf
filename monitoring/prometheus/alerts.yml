# =============================================================================
# CTFTime Discord Bot — Prometheus Alert Rules
# =============================================================================
# Severity levels:
#   critical  — immediate action required; core functionality is degraded
#   warning   — investigation warranted; not yet user-facing
#   info      — informational; no action required
#
# All `for` durations are chosen to suppress transient spikes:
#   - critical: 2m  (fast detection, restarts are common)
#   - warning:  5m–15m (allow self-healing before paging)
# =============================================================================

groups:

  # ---------------------------------------------------------------------------
  # Watchdog
  # A continuously-firing alert that confirms the alerting pipeline is healthy.
  # If this alert stops firing, the monitoring system itself has failed.
  # Wire this to a dead-man's-switch in Alertmanager (e.g. PagerDuty heartbeat).
  # ---------------------------------------------------------------------------
  - name: watchdog
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: info
        annotations:
          summary: "Alertmanager pipeline is operational"
          description: >
            This alert fires continuously to confirm that Prometheus is scraping
            and Alertmanager is receiving alerts. Silence this alert in
            Alertmanager and configure a dead-man's-switch receiver to be
            notified if it stops firing.

  # ---------------------------------------------------------------------------
  # Service availability
  # ---------------------------------------------------------------------------
  - name: ctfbot.availability
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 45s
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "Gateway service is unreachable"
          description: >
            Prometheus cannot scrape the gateway on {{ $labels.instance }}.
            The Discord bot will not respond to any slash commands until this
            is resolved. Check container health and logs immediately.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/gateway-down"

      - alert: SchedulerDown
        expr: up{job="scheduler"} == 0
        for: 2m
        labels:
          severity: critical
          service: scheduler
        annotations:
          summary: "Scheduler service is unreachable"
          description: >
            Prometheus cannot scrape the scheduler on {{ $labels.instance }}.
            Reminders, digests, and CTFTime scraping are all suspended until
            this is resolved.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/scheduler-down"

  # ---------------------------------------------------------------------------
  # Gateway — command error rate
  #
  # Uses `and ... > 0` guard to avoid division-by-zero (NaN) during low-traffic
  # periods, which would produce spurious alerts.
  # ---------------------------------------------------------------------------
  - name: ctfbot.gateway
    rules:
      - alert: HighCommandErrorRate
        expr: >
          (
            sum(rate(gateway_commands_total{result="error"}[5m]))
            /
            sum(rate(gateway_commands_total[5m]))
          ) > 0.10
          and
          sum(rate(gateway_commands_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "Elevated command error rate ({{ $value | humanizePercentage }})"
          description: >
            More than 10% of slash commands have returned errors over the past
            5 minutes. Current rate: {{ $value | humanizePercentage }}.
            This may indicate a bad deployment, upstream API failure, or
            database connectivity issues.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/high-command-error-rate"

      - alert: CommandErrorRateCritical
        expr: >
          (
            sum(rate(gateway_commands_total{result="error"}[5m]))
            /
            sum(rate(gateway_commands_total[5m]))
          ) > 0.50
          and
          sum(rate(gateway_commands_total[5m])) > 0
        for: 2m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "Critical command error rate ({{ $value | humanizePercentage }})"
          description: >
            More than 50% of slash commands are failing. Users are experiencing
            widespread errors. Current rate: {{ $value | humanizePercentage }}.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/high-command-error-rate"

  # ---------------------------------------------------------------------------
  # Scheduler — task health
  #
  # Grouped by (task) so each task fires independently.
  # Same NaN guard as above applied per task dimension.
  # ---------------------------------------------------------------------------
  - name: ctfbot.scheduler
    rules:
      - alert: SchedulerTaskHighErrorRate
        expr: >
          (
            sum(rate(scheduler_tasks_total{result="error"}[15m])) by (task)
            /
            sum(rate(scheduler_tasks_total[15m])) by (task)
          ) > 0.50
          and
          sum(rate(scheduler_tasks_total[15m])) by (task) > 0
        for: 10m
        labels:
          severity: warning
          service: scheduler
        annotations:
          summary: "Scheduler task '{{ $labels.task }}' has high error rate ({{ $value | humanizePercentage }})"
          description: >
            More than 50% of executions for task '{{ $labels.task }}' have
            failed over the past 15 minutes. Affected functionality may include
            CTFTime scraping, reminder delivery, digest sending, or writeup
            notifications.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/scheduler-task-failing"

      - alert: ReminderBacklogBuilding
        expr: scheduler_reminders_pending_count > 50
        for: 10m
        labels:
          severity: warning
          service: scheduler
        annotations:
          summary: "Reminder backlog is elevated ({{ $value }} pending)"
          description: >
            {{ $value }} reminders are queued but have not been dispatched.
            This may indicate the reminder task is stalled, the database is
            slow, or Discord's API is rate-limiting outgoing messages.
            Normal steady-state is under 10 pending reminders.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/reminder-backlog"

  # ---------------------------------------------------------------------------
  # Upstream — CTFTime API
  # ---------------------------------------------------------------------------
  - name: ctfbot.upstream
    rules:
      - alert: CTFTimeApiHighLatency
        # Uses `by (le, endpoint)` — required for histogram_quantile correctness.
        expr: >
          histogram_quantile(
            0.90,
            sum(rate(ctftime_api_latency_seconds_bucket[5m])) by (le, endpoint)
          ) > 10
        for: 10m
        labels:
          severity: warning
          service: scheduler
        annotations:
          summary: "CTFTime API p90 latency is high for '{{ $labels.endpoint }}'"
          description: >
            The 90th-percentile response time for CTFTime API endpoint
            '{{ $labels.endpoint }}' has exceeded 10 seconds for 10 minutes.
            CTFTime scraping and event data may be stale. This is likely an
            upstream issue outside our control — monitor and consider
            increasing scrape intervals if the problem persists.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/ctftime-api-latency"

      - alert: CTFTimeApiHighErrorRate
        # Reuses the precomputed recording rule from recording_rules.yml
        expr: endpoint:ctftime_api_error_rate5m:ratio > 0.25
        for: 10m
        labels:
          severity: warning
          service: scheduler
        annotations:
          summary: "CTFTime API error rate is elevated for '{{ $labels.endpoint }}'"
          description: >
            More than 25% of requests to CTFTime API endpoint
            '{{ $labels.endpoint }}' are returning 4xx/5xx responses or timing
            out. Current rate: {{ $value | humanizePercentage }}.
            Event data may fail to update.
          runbook_url: "https://github.com/you/ctftime-discord-bot/wiki/runbooks/ctftime-api-errors"