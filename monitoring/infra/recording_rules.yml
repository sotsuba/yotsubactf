groups:
  - name: ctfbot_recording_rules
    rules:
      - record: job:gateway_commands_rate5m:sum
        expr: sum(rate(gateway_commands_total[5m])) by (command, result)

      - record: job:scheduler_tasks_rate5m:sum
        expr: sum(rate(scheduler_tasks_total[5m])) by (task, result)

      - record: endpoint:ctftime_api_error_rate5m:ratio
        expr: sum(rate(ctftime_api_requests_total{status=~"[45].*|error"}[5m])) by (endpoint) / sum(rate(ctftime_api_requests_total[5m])) by (endpoint)
