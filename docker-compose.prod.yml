# docker-compose.prod.yml
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    volumes:
      - redisdata_prod:/data
    restart: unless-stopped

  scheduler:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8085"

  gateway:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8085"

  db-backup:
    build:
      context: .
      dockerfile: scripts/backup/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ctfbot
      POSTGRES_USER: ctfbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION}
    volumes:
      - ./scripts/backup/pg_backup.sh:/scripts/pg_backup.sh:ro
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.prod.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
      - backend

  alertmanager:
    build:
      context: ./monitoring/alertmanager
      dockerfile: Dockerfile

    restart: unless-stopped
    environment:
      - ENV=prod
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
    volumes:
      - grafdata_prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3030:3000"
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - ./monitoring/loki/rules:/loki/rules:ro
      - lokidata_prod:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379
    networks:
      - backend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://ctfbot:${POSTGRES_PASSWORD}@postgres:5432/ctfbot?sslmode=disable"
    networks:
      - backend


  metabase:
    image: metabase/metabase:v0.51.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - metabase_data_prod:/metabase-data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ctfbot
      MB_DB_PORT: 5432
      MB_DB_USER: ctfbot
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    networks:
      - backend
      - monitoring

volumes:
  pgdata_prod:
  redisdata_prod:
  grafdata_prod:
  metabase_data_prod:
  lokidata_prod:
